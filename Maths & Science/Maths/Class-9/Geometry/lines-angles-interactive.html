<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Angle Master - Interactive Geometry</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 240px;
            visibility: hidden;
            transform: scaleX(-1);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header-bar {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
        }

        h1 {
            margin: 0;
            color: #d8b4fe;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
            text-shadow: 0 0 10px #a855f7;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 14px;
        }

        .back-btn:hover {
            color: white;
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .hud-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #7c3aed;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
            min-width: 180px;
            text-align: center;
        }

        .hud-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .hud-value {
            font-family: 'Courier New', monospace;
            font-size: 42px;
            font-weight: bold;
            color: #fff;
        }

        #current-angle {
            color: #22d3ee;
            text-shadow: 0 0 8px #22d3ee;
        }

        .angle-type {
            font-size: 14px;
            color: #fbbf24;
            margin-top: 5px;
            font-weight: 600;
        }

        .mission-panel {
            align-self: center;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #eab308;
            border-radius: 16px;
            padding: 20px 40px;
            text-align: center;
            box-shadow: 0 0 30px rgba(234, 179, 8, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: center;
        }

        .mission-panel.success {
            border-color: #22c55e;
            background: rgba(20, 83, 45, 0.9);
            box-shadow: 0 0 50px rgba(34, 197, 94, 0.5);
            transform: scale(1.1);
        }

        .mission-title {
            font-size: 14px;
            color: #fde047;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .mission-target {
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin: 5px 0;
            font-family: 'Segoe UI', sans-serif;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #a855f7;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="text-align: center;">
            <div style="font-weight: bold; font-size: 18px;">Initializing Angle Master...</div>
            <div style="color: #888; margin-top: 5px; font-size: 14px;">Please allow camera access.</div>
        </div>
    </div>
    <div id="ui-layer">
        <div class="header-bar">
            <a href="geometry.html" class="back-btn">← Back</a>
            <h1>Angle Master</h1>
        </div>
        <div class="hud-panel">
            <div class="hud-label">Current Angle</div>
            <div id="current-angle" class="hud-value">0°</div>
            <div id="angle-type" class="angle-type">Zero Angle</div>
        </div>
        <div class="mission-panel" id="mission-panel">
            <div class="mission-title" id="mission-title">MISSION</div>
            <div class="mission-target" id="mission-target">Form a 90° Angle</div>
            <div style="font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 5px;">Move your hand to open the
                angle</div>
        </div>
    </div>
    <video id="input_video"></video>
    <div id="canvas-container"></div>
    <script>
        // ==========================================
        // 0. FALLBACK / LOADING LOGIC (First to ensure it runs)
        // ==========================================
        const loadingDiv = document.getElementById('loading');
        let isMouseMode = false;

        // Timeout to offer fallback if loading hangs
        const loadTimeout = setTimeout(() => {
            if (loadingDiv.style.display !== 'none') {
                loadingDiv.innerHTML = `
                    <div style="color: #fca5a5; max-width: 400px;">
                        <h3>Taking too long?</h3>
                        <p>Camera access might be blocked or AI failed to load.</p>
                        <button onclick="enableMouseMode()" 
                            style="background: #a855f7; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                            Use Mouse Mode Instead
                        </button>
                    </div>
                `;
            }
        }, 2000);

        window.enableMouseMode = function () {
            isMouseMode = true;
            loadingDiv.style.display = 'none';
            if (window.cameraInstance) window.cameraInstance.stop();
            document.getElementById('mission-panel').innerHTML += '<div style="font-size:10px; color:#aaa; margin-top:5px;">(Mouse Mode Active)</div>';
        };

        let currentAngle = 0; let targetAngle = 90; let isSuccess = false; let smoothedAngle = 0; let currentHandX = 0;
        const MISSIONS = [
            { target: 90, type: "Right Angle", tol: 5 }, { target: 45, type: "Acute Angle", tol: 5 },
            { target: 120, type: "Obtuse Angle", tol: 5 }, { target: 180, type: "Straight Line", tol: 5 },
            { target: 0, type: "Zero Angle", tol: 3 }, { target: 60, type: "Acute Angle", tol: 4 },
            { target: 135, type: "Obtuse Angle", tol: 4 }
        ];
        let currentMissionIndex = 0;

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.03);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x050505);
        container.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pointLight = new THREE.PointLight(0xa855f7, 1, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const lineMaterialBase = new THREE.LineBasicMaterial({ color: 0x4B5563, linewidth: 2 });
        const lineMaterialActive = new THREE.LineBasicMaterial({ color: 0x22d3ee, linewidth: 4 });
        const baseRay = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(8, 0, 0)]), lineMaterialBase);
        scene.add(baseRay);
        const activeRay = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), new THREE.Vector3(8, 0, 0)]), lineMaterialActive);
        scene.add(activeRay);
        const vertex = new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 }));
        scene.add(vertex);
        const arcMesh = new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.EllipseCurve(0, 0, 3, 3, 0, 0, false, 0).getPoints(50)), new THREE.LineBasicMaterial({ color: 0xeab308, linewidth: 2 }));
        scene.add(arcMesh);
        const gridHelper = new THREE.GridHelper(30, 30, 0x222222, 0x111111);
        gridHelper.rotation.x = Math.PI / 2; gridHelper.position.z = -2; scene.add(gridHelper);

        function setNextMission() {
            currentMissionIndex = (currentMissionIndex + 1) % MISSIONS.length;
            const mission = MISSIONS[currentMissionIndex];
            targetAngle = mission.target;
            document.getElementById('mission-panel').classList.remove('success');
            document.getElementById('mission-title').innerText = "MISSION";
            document.getElementById('mission-title').style.color = "#fde047";
            document.getElementById('mission-target').innerText = `Form a ${mission.target}° Angle`;
            isSuccess = false;
        }

        function getAngleType(deg) {
            if (Math.abs(deg) < 1) return "Zero Angle";
            if (Math.abs(deg - 90) < 1) return "Right Angle";
            if (Math.abs(deg - 180) < 1) return "Straight Angle";
            if (deg < 90) return "Acute Angle";
            if (deg > 90 && deg < 180) return "Obtuse Angle";
            if (deg > 180 && deg < 360) return "Reflex Angle";
            if (Math.abs(deg - 360) < 1) return "Complete Angle";
            return "Angle";
        }

        function checkSuccess(angle) {
            if (isSuccess) return;
            const mission = MISSIONS[currentMissionIndex];
            if (Math.abs(angle - mission.target) <= mission.tol) {
                isSuccess = true;
                document.getElementById('mission-panel').classList.add('success');
                document.getElementById('mission-title').innerText = "EXCELLENT!";
                document.getElementById('mission-title').style.color = "#fff";
                document.getElementById('mission-target').innerText = "Perfect Match!";
                activeRay.material.color.setHex(0x22c55e);
                setTimeout(() => {
                    activeRay.material.color.setHex(0x22d3ee);
                    setNextMission();
                }, 2000);
            }
        }

        // ==========================================
        // 4. HAND TRACKING LOOP (+ MOUSE FALLBACK)
        // ==========================================
        const videoElement = document.getElementById('input_video');
        // loadingDiv defined at top


        document.addEventListener('mousemove', (e) => {
            if (!isMouseMode) return;
            currentHandX = Math.max(0, Math.min(1, e.clientX / window.innerWidth));
            currentAngle = currentHandX * 180;
        });

        function onResults(results) {
            if (isMouseMode) return;
            clearTimeout(loadTimeout);
            document.getElementById('loading').style.display = 'none';
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const indexTip = hand[8];
                currentHandX = Math.max(0, Math.min(1, 1 - indexTip.x));
                currentAngle = currentHandX * 180;
            }
        }

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { if (!isMouseMode) await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            window.cameraInstance = cameraUtils;
            cameraUtils.start().catch(err => {
                clearTimeout(loadTimeout);
                loadingDiv.innerHTML = `
                    <div style="color: #fca5a5;">
                        <h3>Camera Error</h3>
                        <p>${err.message}</p>
                        <button onclick="enableMouseMode()" style="background: #a855f7; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Use Mouse Mode</button>
                    </div>
                `;
            });
        } else {
            clearTimeout(loadTimeout);
            loadingDiv.innerHTML = `<div style="color: #fca5a5;"><h3>Camera Not Supported</h3><button onclick="enableMouseMode()" style="background: #a855f7; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">Use Mouse Mode</button></div>`;
        }

        function animate() {
            requestAnimationFrame(animate);
            smoothedAngle += (currentAngle - smoothedAngle) * 0.1;
            const rad = smoothedAngle * (Math.PI / 180);
            const positions = activeRay.geometry.attributes.position.array;
            positions[3] = 8 * Math.cos(rad); positions[4] = 8 * Math.sin(rad);
            activeRay.geometry.attributes.position.needsUpdate = true;
            const drawAngle = Math.max(0.1, rad);
            const points = new THREE.EllipseCurve(0, 0, 2.5, 2.5, 0, drawAngle, false, 0).getPoints(50);
            arcMesh.geometry.setFromPoints(points);
            const displayAngle = Math.round(smoothedAngle);
            document.getElementById('current-angle').innerText = `${displayAngle}°`;
            document.getElementById('angle-type').innerText = getAngleType(displayAngle);
            checkSuccess(displayAngle);
            renderer.render(scene, camera);
        }
        document.getElementById('mission-target').innerText = `Form a ${MISSIONS[0].target}° Angle`;
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>

</html>
