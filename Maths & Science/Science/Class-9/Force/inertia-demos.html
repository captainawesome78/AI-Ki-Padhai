<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inertia Demonstrations | AIkiPadhai</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(160deg, #083344, #0e7490); color: #e2e8f0; min-height: 100vh; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(0,0,0,0.3); flex-wrap: wrap; gap: 10px; }
        .topbar a.back { color: #a5f3fc; text-decoration: none; border: 1px solid rgba(165,243,252,0.4); padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .topbar a.back:hover { background: rgba(165,243,252,0.12); }
        .title { font-size: 18px; font-weight: 800; color: #fff; }
        .wrap { max-width: 820px; margin: 0 auto; padding: 20px; }
        .stage { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; text-align: center; }
        svg { width: 100%; max-width: 460px; height: auto; }
        .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
        .chip { flex: 1 1 140px; background: rgba(255,255,255,0.1); border: 2px solid transparent; color: #e2e8f0; padding: 11px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; text-align: center; }
        .chip.active { border-color: #22d3ee; background: rgba(34,211,238,0.15); }
        .btns { display: flex; gap: 10px; }
        .btns button { flex: 1; border: none; padding: 13px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 15px; }
        .go { background: #06b6d4; color: #04222b; } .go:hover { background: #22d3ee; }
        .rst { background: transparent; color: #a5f3fc; border: 1px solid rgba(165,243,252,0.4); }
        .note { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 16px; font-size: 15px; line-height: 1.6; margin-top: 12px; }
        .obs { font-size: 13px; color: #94a3b8; text-align: center; margin-top: 8px; min-height: 18px; }
    </style>
</head>

<body>
    <div class="topbar">
        <a class="back" href="first-law-inertia.html">← Back to Lesson</a>
        <div class="title">🎯 Inertia Demonstrations</div>
        <span style="width:60px"></span>
    </div>
    <div class="wrap">
        <div class="chips" id="chips"></div>
        <div class="stage">
            <svg id="scene" viewBox="0 0 460 240" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="obs" id="obs"></div>
        </div>
        <div class="btns" style="margin-top:14px;">
            <button class="go" onclick="run()">▶ Demo chalao</button>
            <button class="rst" onclick="reset()">↺ Reset</button>
        </div>
        <div class="note" id="note"></div>
    </div>

    <script>
        var DEMOS = [
            { id: "coin", name: "🪙 Coin & Card", type: "Inertia of Rest",
              note: "Card ko tezi se flick karo. Card ud jaata hai lekin sikka (coin) apni jagah (inertia of rest) rukna chahta tha, isliye seedha glass mein gir jaata hai!" },
            { id: "busStart", name: "🚌 Bus Chali", type: "Inertia of Rest",
              note: "Bus achanak aage chali. Aapka body ruka rehna chahta tha (inertia of rest), isliye aap PEECHE ki taraf jhatke!" },
            { id: "busStop", name: "🛑 Bus Ruki", type: "Inertia of Motion",
              note: "Chalti bus achanak ruki. Aapka body chalte rehna chahta tha (inertia of motion), isliye aap AAGE ki taraf jhuke!" },
            { id: "cloth", name: "🍽️ Tablecloth Pull", type: "Inertia of Rest",
              note: "Tablecloth tezi se kheencha. Plate aur glass apni jagah (inertia of rest) rukna chahte the, isliye wo mez par hi rah gaye!" }
        ];
        var cur = 0, animId = null, p = 0, playing = false;

        function draw(p) {
            var d = DEMOS[cur], s = '';
            if (d.id === "coin") {
                s += '<rect x="180" y="150" width="100" height="70" rx="4" fill="none" stroke="#a5f3fc" stroke-width="3"/>';   // glass
                var cardX = 150 + p * 260;
                if (p < 0.9) s += '<rect x="' + cardX + '" y="120" width="70" height="12" rx="2" fill="#fbbf24"/>';           // card flying
                var coinY = p < 0.35 ? 110 : 110 + (p - 0.35) / 0.65 * 75;                                                   // coin falls
                s += '<circle cx="230" cy="' + coinY + '" r="12" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>';
                s += '<text x="230" y="' + (coinY + 4) + '" text-anchor="middle" font-size="10" fill="#7c2d12">₹</text>';
            } else if (d.id === "busStart") {
                var busX = p * 120;
                s += '<rect x="' + (90 + busX) + '" y="120" width="180" height="80" rx="10" fill="#38bdf8" opacity="0.5" stroke="#0284c7" stroke-width="2"/>';
                var lean = p * 22;
                s += '<circle cx="' + (200 + busX - lean) + '" cy="150" r="14" fill="#fca5a5"/>';                            // head leans back
                s += '<rect x="' + (194 + busX - lean * 0.5) + '" y="163" width="14" height="30" fill="#fca5a5"/>';
                if (p > 0.2) s += '<text x="' + (250 + busX) + '" y="115" font-size="16">💨</text>';
            } else if (d.id === "busStop") {
                var bx2 = 120 - p * 20;
                s += '<rect x="90" y="120" width="180" height="80" rx="10" fill="#38bdf8" opacity="0.5" stroke="#0284c7" stroke-width="2"/>';
                var lean2 = p * 24;
                s += '<circle cx="' + (200 + lean2) + '" cy="150" r="14" fill="#fca5a5"/>';                                  // head leans forward
                s += '<rect x="' + (194 + lean2 * 0.5) + '" y="163" width="14" height="30" fill="#fca5a5"/>';
                if (p > 0.2) s += '<text x="70" y="115" font-size="16">🛑</text>';
            } else if (d.id === "cloth") {
                var clothX = -p * 300;
                s += '<rect x="140" y="150" width="180" height="12" fill="#8b5cf6"/>';   // table top
                s += '<rect x="' + (150 + clothX) + '" y="140" width="180" height="10" fill="#fbbf24"/>';   // cloth pulled left
                var settle = p > 0.85 ? 3 : 0;
                s += '<rect x="180" y="' + (120 + settle) + '" width="34" height="26" rx="3" fill="#e2e8f0"/>';  // plate stays
                s += '<rect x="250" y="' + (118 + settle) + '" width="18" height="30" rx="3" fill="#a5f3fc"/>';  // glass stays
            }
            document.getElementById('scene').innerHTML = s;
        }
        function run() {
            if (animId) cancelAnimationFrame(animId);
            document.getElementById('obs').textContent = 'Dekho dhyan se...';
            var t0 = null, dur = 1600;
            function step(ts) { if (!t0) t0 = ts; p = Math.min((ts - t0) / dur, 1); draw(p); if (p < 1) animId = requestAnimationFrame(step); else document.getElementById('obs').textContent = '✅ Dekha? ' + DEMOS[cur].type + ' ka kamaal!'; }
            animId = requestAnimationFrame(step);
        }
        function reset() { if (animId) cancelAnimationFrame(animId); p = 0; draw(0); document.getElementById('obs').textContent = '"Demo chalao" dabao.'; }
        function refresh() {
            var box = document.getElementById('chips'); box.innerHTML = '';
            DEMOS.forEach(function (d, i) {
                var c = document.createElement('div'); c.className = 'chip' + (i === cur ? ' active' : '');
                c.innerHTML = d.name; c.onclick = function () { cur = i; refresh(); }; box.appendChild(c);
            });
            document.getElementById('note').innerHTML = '<b>' + DEMOS[cur].type + ':</b> ' + DEMOS[cur].note;
            reset();
        }
        refresh();
    </script>
</body>

</html>
