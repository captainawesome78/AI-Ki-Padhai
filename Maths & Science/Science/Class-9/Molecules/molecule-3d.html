<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Molecule Viewer | AIkiPadhai</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../sci-3d.js"></script>
</head>

<body>
    <script>
        // atom colours/sizes
        var A = { H: [0xf1f5f9, 0.32], C: [0x334155, 0.55], N: [0x3b82f6, 0.52], O: [0xef4444, 0.5], Cl: [0x22c55e, 0.6] };
        // molecules: name, formula, shape note, atoms [element, x,y,z], bonds [[i,j],...]
        var MOL = [
            { key: "water", name: "Paani (H₂O)", shape: "Bent (mudi hui) - 104.5°",
              desc: "Do hydrogen aur ek oxygen. Iski 'bent' shape ki wajah se paani ek bahut achha solvent hai.",
              atoms: [["O", 0, 0, 0], ["H", 1.5, 1.1, 0], ["H", -1.5, 1.1, 0]], bonds: [[0, 1], [0, 2]] },
            { key: "co2", name: "Carbon dioxide (CO₂)", shape: "Linear (seedhi line) - 180°",
              desc: "Ek carbon ke dono taraf oxygen - bilkul seedhi line mein. Ye hum saans mein chhodte hain.",
              atoms: [["C", 0, 0, 0], ["O", 2.2, 0, 0], ["O", -2.2, 0, 0]], bonds: [[0, 1], [0, 2]] },
            { key: "methane", name: "Methane (CH₄)", shape: "Tetrahedral (chaar kone) - 109.5°",
              desc: "Ek carbon ke charon taraf 4 hydrogen, ek pyramid jaisi 3D shape mein. Ye natural gas hai.",
              atoms: [["C", 0, 0, 0], ["H", 1.2, 1.2, 1.2], ["H", -1.2, -1.2, 1.2], ["H", -1.2, 1.2, -1.2], ["H", 1.2, -1.2, -1.2]],
              bonds: [[0, 1], [0, 2], [0, 3], [0, 4]] },
            { key: "ammonia", name: "Ammonia (NH₃)", shape: "Pyramidal (teen paav wala)",
              desc: "Ek nitrogen ke saath 3 hydrogen - ek pyramid jaisi shape. Iski teekhi (pungent) smell hoti hai.",
              atoms: [["N", 0, 0.4, 0], ["H", 1.5, -0.5, 0.6], ["H", -1.3, -0.5, 0.9], ["H", 0, -0.5, -1.6]],
              bonds: [[0, 1], [0, 2], [0, 3]] }
        ];

        function bondMesh(T, ctx, p1, p2) {
            var dir = p2.clone().sub(p1), len = dir.length();
            var m = new T.Mesh(new T.CylinderGeometry(0.12, 0.12, len, 10), ctx.mat(0xcbd5e1));
            m.position.copy(p1.clone().add(p2).multiplyScalar(0.5));
            m.quaternion.setFromUnitVectors(new T.Vector3(0, 1, 0), dir.clone().normalize());
            return m;
        }

        function buildMol(idx, ctx) {
            var T = ctx.THREE, M = ctx.model;
            if (M.g) ctx.pivot.remove(M.g);
            M.g = new T.Group(); ctx.pivot.add(M.g);
            var mol = MOL[idx];
            var pts = mol.atoms.map(function (a) { return new T.Vector3(a[1], a[2], a[3]); });
            mol.bonds.forEach(function (b) { M.g.add(bondMesh(T, ctx, pts[b[0]], pts[b[1]])); });
            mol.atoms.forEach(function (a, i) {
                var spec = A[a[0]];
                var s = new T.Mesh(new T.SphereGeometry(spec[1], 24, 24), ctx.mat(spec[0]));
                s.position.copy(pts[i]);
                ctx.addPart(s, a[0]); M.g.add(s);
            });
            var nm = document.getElementById('s3-name'), ds = document.getElementById('s3-desc'), nk = document.getElementById('s3-nick');
            if (nm) nm.textContent = mol.name;
            if (nk) { nk.textContent = mol.shape; nk.style.display = 'inline-block'; }
            if (ds) { ds.classList.remove('ph'); ds.innerHTML = mol.desc + '<br><span style="color:#94a3b8">Kisi bhi atom par tap karke jaano wo kaunsa element hai.</span>'; }
        }

        Sci3D({
            title: "🧊 3D Molecule Viewer",
            back: { href: "molecules-ions.html", label: "Back to Lesson" },
            intro: { name: "3D Molecule Viewer", desc: "Neeche slider se molecule chuno. Drag karke ghumao aur atoms par tap karo." },
            camZ: 12,
            data: {
                H: { emoji: "⚪", name: "Hydrogen (H)", nick: "Sabse halka", desc: "Sabse chhota aur halka atom. Valency 1 - ek bond banata hai." },
                C: { emoji: "⚫", name: "Carbon (C)", nick: "Valency 4", desc: "Chaar bonds bana sakta hai - isi wajah se carbon crores compounds banata hai (poori organic chemistry!)." },
                N: { emoji: "🔵", name: "Nitrogen (N)", nick: "Valency 3", desc: "Teen bonds banata hai. Hawa ka 78% nitrogen gas hai." },
                O: { emoji: "🔴", name: "Oxygen (O)", nick: "Valency 2", desc: "Do bonds banata hai. Saans lene ke liye zaroori." },
                Cl: { emoji: "🟢", name: "Chlorine (Cl)", nick: "Valency 1", desc: "Ek bond banata hai. Namak (NaCl) mein milta hai." }
            },
            controls: [
                { id: "mol", label: "🔬 Molecule chuno (1=Paani, 2=CO₂, 3=Methane, 4=Ammonia)", min: 0, max: 3, step: 1, value: 0, on: function (v, ctx) { buildMol(v, ctx); } }
            ],
            build: function (ctx) { ctx.model = {}; buildMol(0, ctx); ctx.pivot.rotation.x = 0.25; }
        });
    </script>
</body>

</html>
