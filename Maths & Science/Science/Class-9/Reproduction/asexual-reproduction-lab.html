<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asexual Reproduction Simulator | AIkiPadhai</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(160deg, #083344, #0e7490); color: #e2e8f0; min-height: 100vh; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(0,0,0,0.3); flex-wrap: wrap; gap: 10px; }
        .topbar a.back { color: #a5f3fc; text-decoration: none; border: 1px solid rgba(165,243,252,0.4); padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .topbar a.back:hover { background: rgba(165,243,252,0.12); }
        .title { font-size: 18px; font-weight: 800; color: #fff; }
        .wrap { display: flex; gap: 20px; padding: 20px; max-width: 1050px; margin: 0 auto; flex-wrap: wrap; }
        .stage { flex: 1 1 360px; min-width: 300px; background: rgba(255,255,255,0.04); border-radius: 18px; padding: 16px; text-align: center; }
        .stage svg { width: 100%; max-width: 360px; height: auto; background: rgba(0,0,0,0.15); border-radius: 12px; }
        .controls { flex: 1 1 320px; min-width: 300px; }
        .card { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 18px 20px; margin-bottom: 16px; }
        .card h3 { color: #fff; font-size: 15px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }
        .chips { display: flex; gap: 10px; flex-wrap: wrap; }
        .chip { background: rgba(255,255,255,0.1); border: 2px solid transparent; color: #e2e8f0; padding: 10px 12px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .chip.active { border-color: #22d3ee; background: rgba(34,211,238,0.15); }
        .chip .em { font-size: 20px; }
        button.run { width: 100%; background: #06b6d4; color: #04222b; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
        button.run:hover { background: #22d3ee; }
        button.reset { width: 100%; background: transparent; color: #a5f3fc; border: 1px solid rgba(165,243,252,0.4); padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .result { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 16px; font-size: 15px; line-height: 1.6; }
        .result .rhead { font-weight: 800; font-size: 16px; margin-bottom: 6px; color: #fff; }
        .obs { font-size: 13px; color: #94a3b8; text-align: center; margin-top: 8px; min-height: 18px; }
        .badge { display:inline-block; background:#0e7490; color:#a5f3fc; font-size:11px; font-weight:800; padding:2px 10px; border-radius:999px; margin-bottom:8px; }
    </style>
</head>

<body>
    <div class="topbar">
        <a class="back" href="asexual-reproduction.html">← Back to Lesson</a>
        <div class="title">🧪 Asexual Reproduction Simulator</div>
        <span style="width:60px"></span>
    </div>

    <div class="wrap">
        <div class="stage">
            <svg id="scene" viewBox="0 0 360 260" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="obs" id="obs">Ek jeev chuno aur "Reproduce" dabao.</div>
        </div>
        <div class="controls">
            <div class="card">
                <h3>1. Jeev chuno</h3>
                <div class="chips" id="org-chips">
                    <div class="chip active" data-org="amoeba"><span class="em">🦠</span>Amoeba</div>
                    <div class="chip" data-org="hydra"><span class="em">🪸</span>Hydra</div>
                    <div class="chip" data-org="yeast"><span class="em">🍞</span>Yeast</div>
                    <div class="chip" data-org="planaria"><span class="em">🪱</span>Planaria</div>
                </div>
            </div>
            <div class="card">
                <button class="run" onclick="play()">▶ Reproduce!</button>
                <button class="reset" onclick="resetSim()">↺ Reset</button>
            </div>
            <div class="card">
                <div class="result" id="result"></div>
            </div>
        </div>
    </div>

    <script>
        var ORG = {
            amoeba:   { name: "Amoeba", method: "Binary Fission", badge: "1 → 2",
                res: "Amoeba <b>binary fission</b> karta hai: parent cell ka nucleus pehle divide hota hai, phir poora cell beech se pinch hokar DO barabar cells ban jaata hai. Dono naye Amoeba parent ki exact copy hain." },
            hydra:    { name: "Hydra", method: "Budding", badge: "bud → new",
                res: "Hydra <b>budding</b> karta hai: body ke side par ek chhoti kali (bud) ugti hai, badi hoti hai, apne tentacles banati hai, aur phir alag hokar naya Hydra ban jaati hai." },
            yeast:    { name: "Yeast", method: "Budding", badge: "chain",
                res: "Yeast bhi <b>budding</b> karta hai: cell par ek bud nikalta hai, jo badhkar naya cell banta hai. Kabhi-kabhi buds par bhi buds nikal aate hain - ek chain ban jaati hai!" },
            planaria: { name: "Planaria", method: "Regeneration", badge: "cut → 2 worms",
                res: "Planaria <b>regeneration</b> kar sakta hai: agar iska tukda ho jaaye, toh har tukda apne missing parts (head/tail) wapas ugaakar poora naya Planaria ban jaata hai!" }
        };
        var current = "amoeba", animId = null, C = { x: 180, y: 130 };

        function E(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

        function draw(org, p) {
            var s = '';
            if (org === 'amoeba') {
                var sep = p < 0.4 ? 0 : (p - 0.4) / 0.6 * 62;
                var neck = p < 0.4 ? 1 : 1 - (p - 0.4) / 0.6;
                s += '<ellipse cx="' + (C.x) + '" cy="' + C.y + '" rx="' + (44 + sep * 0.15) + '" ry="' + (40 * neck + 4) + '" fill="#4ade80" opacity="0.35"/>';
                s += '<circle cx="' + (C.x - sep) + '" cy="' + C.y + '" r="40" fill="#86efac" stroke="#16a34a" stroke-width="3"/>';
                s += '<circle cx="' + (C.x + sep) + '" cy="' + C.y + '" r="40" fill="#86efac" stroke="#16a34a" stroke-width="3"/>';
                if (p < 0.35) { s += '<circle cx="' + C.x + '" cy="' + C.y + '" r="12" fill="#15803d"/>'; }
                else { s += '<circle cx="' + (C.x - sep) + '" cy="' + C.y + '" r="11" fill="#15803d"/><circle cx="' + (C.x + sep) + '" cy="' + C.y + '" r="11" fill="#15803d"/>'; }
            } else if (org === 'hydra') {
                s += '<rect x="140" y="60" width="30" height="150" rx="15" fill="#fca5a5" stroke="#dc2626" stroke-width="3"/>';
                for (var t = 0; t < 4; t++) s += '<line x1="155" y1="62" x2="' + (120 + t * 22) + '" y2="35" stroke="#dc2626" stroke-width="2"/>';
                var bg = Math.min(p / 0.8, 1), bx = 185 + (p > 0.8 ? (p - 0.8) / 0.2 * 70 : 0);
                if (bg > 0) {
                    s += '<circle cx="' + bx + '" cy="150" r="' + (bg * 26) + '" fill="#fca5a5" stroke="#dc2626" stroke-width="3"/>';
                    if (bg > 0.6) for (var u = 0; u < 3; u++) s += '<line x1="' + bx + '" y1="' + (150 - bg * 26) + '" x2="' + (bx - 15 + u * 15) + '" y2="' + (150 - bg * 26 - 18) + '" stroke="#dc2626" stroke-width="2"/>';
                }
            } else if (org === 'yeast') {
                s += '<circle cx="130" cy="140" r="38" fill="#fde68a" stroke="#d97706" stroke-width="3"/>';
                var b1 = Math.min(p / 0.6, 1);
                if (b1 > 0) s += '<circle cx="185" cy="120" r="' + (b1 * 26) + '" fill="#fde68a" stroke="#d97706" stroke-width="3"/>';
                if (p > 0.6) { var b2 = (p - 0.6) / 0.4; s += '<circle cx="225" cy="100" r="' + (b2 * 20) + '" fill="#fde68a" stroke="#d97706" stroke-width="3"/>'; }
            } else if (org === 'planaria') {
                if (p < 0.5) {
                    var gap = (p / 0.5) * 18;
                    s += '<rect x="60" y="118" width="' + (110 - gap) + '" height="26" rx="13" fill="#c084fc" stroke="#7e22ce" stroke-width="3"/>';
                    s += '<rect x="' + (190 + gap) + '" y="118" width="' + (110 - gap) + '" height="26" rx="13" fill="#c084fc" stroke="#7e22ce" stroke-width="3"/>';
                    s += '<circle cx="70" cy="131" r="6" fill="#581c87"/><circle cx="290" cy="131" r="6" fill="#581c87"/>';
                    if (p > 0.1) s += '<text x="180" y="110" text-anchor="middle" font-size="20">✂️</text>';
                } else {
                    var g = (p - 0.5) / 0.5;
                    s += '<rect x="60" y="80" width="' + (110 + g * 40) + '" height="24" rx="12" fill="#c084fc" stroke="#7e22ce" stroke-width="3"/>';
                    s += '<rect x="' + (170 - g * 40) + '" y="170" width="' + (110 + g * 40) + '" height="24" rx="12" fill="#c084fc" stroke="#7e22ce" stroke-width="3"/>';
                    s += '<circle cx="70" cy="92" r="6" fill="#581c87"/><circle cx="' + (280 - 0) + '" cy="182" r="6" fill="#581c87"/>';
                    // regenerated ends highlighted
                    s += '<rect x="' + (60 + 110) + '" y="80" width="' + (g * 40) + '" height="24" rx="10" fill="#e9d5ff" stroke="#7e22ce" stroke-width="2"/>';
                }
            }
            document.getElementById('scene').innerHTML = s;
        }

        function play() {
            if (animId) cancelAnimationFrame(animId);
            var t0 = null, dur = 2600;
            document.getElementById('obs').textContent = ORG[current].name + ' reproduce kar raha hai...';
            document.getElementById('result').innerHTML = '';
            function step(ts) {
                if (!t0) t0 = ts;
                var p = Math.min((ts - t0) / dur, 1);
                draw(current, E(p));
                if (p < 1) animId = requestAnimationFrame(step);
                else finish();
            }
            animId = requestAnimationFrame(step);
        }
        function finish() {
            var o = ORG[current];
            document.getElementById('obs').textContent = '✅ Ho gaya! Naya jeev ban gaya.';
            document.getElementById('result').innerHTML = '<span class="badge">' + o.method + ' • ' + o.badge + '</span>' +
                '<div class="rhead">' + o.name + ' - ' + o.method + '</div>' + o.res;
        }
        function resetSim() {
            if (animId) cancelAnimationFrame(animId);
            draw(current, 0);
            document.getElementById('obs').textContent = '"Reproduce" dabao aur dekho ' + ORG[current].name + ' kaise naye jeev banata hai.';
            document.getElementById('result').innerHTML = '<span class="badge">' + ORG[current].method + '</span><div class="rhead">' + ORG[current].name + '</div>' + ORG[current].res;
        }
        document.querySelectorAll('#org-chips .chip').forEach(function (chip) {
            chip.addEventListener('click', function () {
                document.querySelectorAll('#org-chips .chip').forEach(function (c) { c.classList.remove('active'); });
                chip.classList.add('active'); current = chip.getAttribute('data-org'); resetSim();
            });
        });
        resetSim();
    </script>
</body>

</html>
