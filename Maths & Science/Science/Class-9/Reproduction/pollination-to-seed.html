<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pollination to Seed Animation | AIkiPadhai</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(160deg, #052e2b, #0d9488); color: #e2e8f0; min-height: 100vh; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(0,0,0,0.3); flex-wrap: wrap; gap: 10px; }
        .topbar a.back { color: #99f6e4; text-decoration: none; border: 1px solid rgba(153,246,228,0.4); padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .topbar a.back:hover { background: rgba(153,246,228,0.12); }
        .title { font-size: 18px; font-weight: 800; color: #fff; }
        .wrap { display: flex; gap: 20px; padding: 20px; max-width: 1050px; margin: 0 auto; flex-wrap: wrap; }
        .stage { flex: 1 1 340px; min-width: 300px; background: rgba(255,255,255,0.04); border-radius: 18px; padding: 16px; text-align: center; }
        .stage svg { width: 100%; max-width: 320px; height: auto; }
        .controls { flex: 1 1 320px; min-width: 300px; }
        .card { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 18px 20px; margin-bottom: 16px; }
        .dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: #2dd4bf; transform: scale(1.2); }
        .steprow { display: flex; gap: 10px; }
        .steprow button { flex: 1; border: none; padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; font-size: 14px; }
        .btn-prev { background: rgba(255,255,255,0.12); color: #e2e8f0; }
        .btn-next { background: #14b8a6; color: #04241c; }
        button.auto { width: 100%; background: transparent; color: #99f6e4; border: 1px solid rgba(153,246,228,0.4); padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .expl { background: rgba(0,0,0,0.25); border-radius: 12px; padding: 16px; font-size: 15px; line-height: 1.6; min-height: 120px; }
        .expl .num { display:inline-block; background:#14b8a6; color:#04241c; font-weight:800; font-size:13px; padding:2px 10px; border-radius:999px; margin-bottom:8px; }
        .expl h3 { color: #fff; font-size: 18px; margin: 4px 0 8px; }
    </style>
</head>

<body>
    <div class="topbar">
        <a class="back" href="flowering-plants.html">← Back to Lesson</a>
        <div class="title">🎬 Pollination to Seed</div>
        <span style="width:60px"></span>
    </div>

    <div class="wrap">
        <div class="stage">
            <svg id="scene" viewBox="0 0 320 340" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="controls">
            <div class="card">
                <div class="dots" id="dots"></div>
                <div class="expl" id="expl"></div>
            </div>
            <div class="card">
                <div class="steprow">
                    <button class="btn-prev" onclick="step(-1)">◀ Prev</button>
                    <button class="btn-next" onclick="step(1)">Next ▶</button>
                </div>
                <button class="auto" onclick="autoPlay()">▶ Auto-play (shuru se)</button>
            </div>
        </div>
    </div>

    <script>
        var STEPS = [
            { n: "Step 1", t: "Pollination", d: "Ek madhumakkhi (bee) pollen leke aati hai aur wo pollen phool ke <b>stigma</b> par gir jaata hai. Anther se stigma tak pollen ka pahunchna hi <b>pollination</b> hai." },
            { n: "Step 2", t: "Pollen Tube Ugna", d: "Stigma par gira pollen ek <b>pollen tube</b> ugaata hai, jo <b>style</b> ke through neeche <b>ovary</b> ki taraf badhta hai - male gamete ko leke." },
            { n: "Step 3", t: "Fertilisation", d: "Pollen tube <b>ovule</b> tak pahunchta hai. Male gamete + egg (female gamete) milte hain - ye <b>fertilisation</b> hai. Ab banta hai <b>Zygote</b> (naye plant ki pehli cell)." },
            { n: "Step 4", t: "Seed &amp; Fruit", d: "Fertilisation ke baad: <b>ovule → Seed</b> aur <b>ovary → Fruit</b> ban jaati hai! Petals sukhkar gir jaate hain. Seed aage chalkar naya plant banaayega." }
        ];
        var cur = 0;

        function flowerBase() {
            // returns base flower (petals depend on step handled by caller)
            return '';
        }
        function drawStep(n) {
            var s = '';
            var petals = (n < 3); // petals wilt at last step
            // stem
            s += '<rect x="152" y="250" width="10" height="80" fill="#4d7c0f"/>';
            // petals
            if (petals) {
                var col = '#f472b6';
                [[-1,-0.2],[1,-0.2],[-0.7,-1],[0.7,-1]].forEach(function(d){
                    s += '<ellipse cx="'+(157+d[0]*42)+'" cy="'+(150+d[1]*30)+'" rx="26" ry="16" fill="'+col+'" stroke="#db2777" transform="rotate('+(d[0]*30)+' '+(157+d[0]*42)+' '+(150+d[1]*30)+')"/>';
                });
            }
            // stigma
            s += '<ellipse cx="157" cy="70" rx="16" ry="9" fill="#059669" stroke="#065f46" stroke-width="2"/>';
            // style
            s += '<rect x="153" y="70" width="8" height="90" fill="#34d399"/>';
            // ovary / fruit
            if (n < 3) {
                s += '<ellipse cx="157" cy="185" rx="26" ry="30" fill="#a7f3d0" stroke="#059669" stroke-width="2"/>';
                s += '<circle cx="149" cy="188" r="5" fill="#065f46"/><circle cx="165" cy="188" r="5" fill="#065f46"/>';
            } else {
                // fruit
                s += '<circle cx="157" cy="188" r="40" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>';
                s += '<text x="157" y="150" text-anchor="middle" font-size="18">🍎</text>';
                s += '<circle cx="148" cy="192" r="6" fill="#7c2d12"/><circle cx="166" cy="192" r="6" fill="#7c2d12"/>';
                s += '<text x="157" y="250" text-anchor="middle" font-size="11" fill="#fecaca">Ovary → Fruit, Ovules → Seeds</text>';
            }
            // step-specific overlays
            if (n === 0) {
                s += '<text x="230" y="55" font-size="30">🐝</text>';
                s += '<circle cx="150" cy="66" r="3" fill="#f59e0b"/><circle cx="160" cy="63" r="3" fill="#f59e0b"/><circle cx="157" cy="70" r="3" fill="#f59e0b"/>';
                s += '<text x="157" y="30" text-anchor="middle" font-size="12" fill="#fde68a">Pollen lands on stigma</text>';
            } else if (n === 1) {
                s += '<path d="M157 74 q-8 45 0 90" stroke="#f59e0b" stroke-width="3" fill="none" stroke-dasharray="5"/>';
                s += '<text x="210" y="120" font-size="11" fill="#fde68a">Pollen tube</text>';
            } else if (n === 2) {
                s += '<path d="M157 74 q-8 55 0 108" stroke="#f59e0b" stroke-width="3" fill="none"/>';
                s += '<text x="157" y="188" text-anchor="middle" font-size="16">💞</text>';
                s += '<text x="200" y="188" font-size="11" fill="#fde68a">Zygote!</text>';
            }
            document.getElementById('scene').innerHTML = s;
            // text + dots
            var st = STEPS[n];
            document.getElementById('expl').innerHTML = '<span class="num">' + st.n + ' / 4</span><h3>' + st.t + '</h3>' + st.d;
            var dots = '';
            for (var i = 0; i < 4; i++) dots += '<div class="dot' + (i === n ? ' active' : '') + '"></div>';
            document.getElementById('dots').innerHTML = dots;
        }
        function step(dir) { cur = Math.max(0, Math.min(3, cur + dir)); drawStep(cur); }
        var autoId = null;
        function autoPlay() {
            if (autoId) clearInterval(autoId);
            cur = 0; drawStep(0);
            autoId = setInterval(function () {
                if (cur >= 3) { clearInterval(autoId); return; }
                cur++; drawStep(cur);
            }, 1800);
        }
        drawStep(0);
    </script>
</body>

</html>
