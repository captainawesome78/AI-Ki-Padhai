<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tissue Microscope Explorer | AIkiPadhai</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(160deg, #0f172a, #134e4a); color: #e2e8f0; min-height: 100vh; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: rgba(0,0,0,0.3); flex-wrap: wrap; gap: 10px; }
        .topbar a.back { color: #a7f3d0; text-decoration: none; border: 1px solid rgba(167,243,208,0.4); padding: 7px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; }
        .topbar a.back:hover { background: rgba(167,243,208,0.12); }
        .title { font-size: 18px; font-weight: 800; color: #fff; }
        .wrap { display: flex; gap: 20px; padding: 20px; max-width: 1150px; margin: 0 auto; flex-wrap: wrap; }
        .scope-col { flex: 1 1 380px; min-width: 300px; }
        .scope { position: relative; width: 100%; max-width: 380px; aspect-ratio: 1; margin: 0 auto; border-radius: 50%; background: radial-gradient(circle at 50% 40%, #fefce8 0%, #fef3c7 60%, #a16207 100%); box-shadow: 0 0 0 14px #1e293b, 0 0 0 20px #0f172a, 0 12px 40px rgba(0,0,0,0.6); overflow: hidden; }
        .scope svg { position: absolute; top: 50%; left: 50%; width: 78%; height: 78%; transform: translate(-50%,-50%) scale(1); transition: transform .3s ease; }
        .scope .vignette { position: absolute; inset: 0; border-radius: 50%; box-shadow: inset 0 0 60px rgba(0,0,0,0.45); pointer-events: none; }
        .magbadge { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #fde68a; font-size: 13px; font-weight: 800; padding: 4px 12px; border-radius: 999px; }
        .zoom-row { max-width: 380px; margin: 16px auto 0; text-align: center; }
        .zoom-row label { font-size: 13px; color: #94a3b8; }
        input[type=range] { width: 100%; accent-color: #34d399; margin-top: 6px; }
        .ctrl-col { flex: 1 1 320px; min-width: 300px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tabs button { flex: 1; border: none; background: rgba(255,255,255,0.1); color: #cbd5e1; padding: 9px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .tabs button.active { background: #10b981; color: #04241c; }
        .chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: rgba(255,255,255,0.08); border: 1.5px solid transparent; color: #e2e8f0; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .chip:hover { border-color: #34d399; }
        .chip.active { background: rgba(52,211,153,0.18); border-color: #34d399; }
        .panel { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; margin-top: 16px; }
        .panel h2 { color: #fff; font-size: 20px; margin-bottom: 4px; }
        .panel .grp { display: inline-block; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 999px; margin-bottom: 10px; }
        .grp.plant { background: #dcfce7; color: #15803d; }
        .grp.animal { background: #fee2e2; color: #b91c1c; }
        .panel p { color: #cbd5e1; font-size: 15px; line-height: 1.6; margin: 8px 0; }
        .panel .lbl { color: #34d399; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
        .hint { text-align: center; font-size: 13px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>

<body>
    <div class="topbar">
        <a class="back" href="tissues.html">← Back to Chapter</a>
        <div class="title">🔬 Tissue Microscope Explorer</div>
        <span style="width:60px"></span>
    </div>

    <div class="wrap">
        <div class="scope-col">
            <div class="scope">
                <div id="slide"></div>
                <div class="vignette"></div>
                <div class="magbadge" id="magbadge">10x</div>
            </div>
            <div class="zoom-row">
                <label>🔎 Zoom (magnification): <span id="zoomval">10x</span></label>
                <input type="range" id="zoom" min="1" max="3" step="1" value="1" oninput="setZoom()">
            </div>
            <div class="hint">Left se tissue chuno, phir zoom slider se paas jaake dekho.</div>
        </div>

        <div class="ctrl-col">
            <div class="tabs">
                <button id="tab-plant" class="active" onclick="setTab('plant')">🌱 Plant Tissues</button>
                <button id="tab-animal" onclick="setTab('animal')">🐾 Animal Tissues</button>
            </div>
            <div class="chips" id="chips"></div>
            <div class="panel">
                <h2 id="p-name">Tissue chuno</h2>
                <span id="p-grp" class="grp plant" style="display:none"></span>
                <p id="p-feat"><span class="lbl">Pehchaan:</span> <span id="feat"></span></p>
                <p id="p-func"><span class="lbl">Kaam:</span> <span id="func"></span></p>
            </div>
        </div>
    </div>

    <script>
        var DATA = {
            parenchyma: { name: "Parenchyma", group: "plant", mag: "10x",
                feat: "Round-ish living cells, patli wall, beech mein khaali space (intercellular gaps), chhota nucleus.",
                func: "Khaana aur paani store karna, packing, aur (chlorenchyma roop mein) photosynthesis.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#dcfce7' stroke='#22c55e' stroke-width='3'><circle cx='65' cy='65' r='30'/><circle cx='135' cy='60' r='30'/><circle cx='60' cy='135' r='30'/><circle cx='135' cy='135' r='30'/></g><g fill='#16a34a'><circle cx='65' cy='65' r='6'/><circle cx='135' cy='60' r='6'/><circle cx='60' cy='135' r='6'/><circle cx='135' cy='135' r='6'/></g></svg>" },
            collenchyma: { name: "Collenchyma", group: "plant", mag: "10x",
                feat: "Living cells jinke KONE (corners) par wall extra moti hoti hai.",
                func: "Plant ko flexible support - jhukne deta hai bina toote (climbers, leaf stalks).",
                svg: "<svg viewBox='0 0 200 200'><g fill='#dbeafe' stroke='#2563eb' stroke-width='9' stroke-linejoin='round'><rect x='40' y='40' width='55' height='55' rx='4'/><rect x='105' y='40' width='55' height='55' rx='4'/><rect x='40' y='105' width='55' height='55' rx='4'/><rect x='105' y='105' width='55' height='55' rx='4'/></g></svg>" },
            sclerenchyma: { name: "Sclerenchyma", group: "plant", mag: "10x",
                feat: "DEAD cells, bahut moti lignin wall, lambe aur nukeele (fibres). Andar khaali (no living matter).",
                func: "Plant ko hardness aur strength - nariyal ka khol, nut shells, seed coats.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#fef3c7' stroke='#78350f' stroke-width='14'><ellipse cx='70' cy='100' rx='20' ry='70'/><ellipse cx='130' cy='100' rx='20' ry='70'/></g></svg>" },
            xylem: { name: "Xylem", group: "plant", mag: "10x",
                feat: "Lambe HOLLOW (khokhle) tubes (vessels/tracheids), mostly DEAD, wall par pits.",
                func: "Paani aur minerals ko jadon se pattiyon tak UPAR le jaana.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#bfdbfe' stroke='#1d4ed8' stroke-width='6'><rect x='60' y='20' width='80' height='50' rx='6'/><rect x='60' y='75' width='80' height='50' rx='6'/><rect x='60' y='130' width='80' height='50' rx='6'/></g><g stroke='#1d4ed8' stroke-width='3'><line x1='75' y1='70' x2='125' y2='70' stroke-dasharray='6'/><line x1='75' y1='125' x2='125' y2='125' stroke-dasharray='6'/></g></svg>" },
            phloem: { name: "Phloem", group: "plant", mag: "10x",
                feat: "Sieve tubes (chhalni jaisi plates ke saath) + companion cells. Mostly LIVING.",
                func: "Pattiyon mein bana khaana poore plant mein (dono taraf) pahunchana.",
                svg: "<svg viewBox='0 0 200 200'><rect x='55' y='20' width='55' height='160' rx='6' fill='#fed7aa' stroke='#ea580c' stroke-width='5'/><g stroke='#c2410c' stroke-width='4'><line x1='55' y1='73' x2='110' y2='73'/><line x1='55' y1='127' x2='110' y2='127'/></g><rect x='118' y='60' width='34' height='80' rx='6' fill='#ffedd5' stroke='#ea580c' stroke-width='4'/><circle cx='135' cy='100' r='7' fill='#c2410c'/></svg>" },
            squamous: { name: "Squamous Epithelium", group: "animal", mag: "40x",
                feat: "Chapte (flat), patle cells - farsh ki tiles jaise judi hui, beech mein nucleus.",
                func: "Body ki lining aur covering - skin, mooh, blood vessels ki surface. Protection.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#e0f2fe' stroke='#0284c7' stroke-width='3'><polygon points='30,60 90,50 100,95 40,105'/><polygon points='100,95 90,50 160,55 165,100'/><polygon points='40,105 100,95 95,150 45,155'/><polygon points='100,95 165,100 160,150 95,150'/></g><g fill='#0369a1'><circle cx='65' cy='80' r='7'/><circle cx='128' cy='78' r='7'/><circle cx='70' cy='128' r='7'/><circle cx='128' cy='123' r='7'/></g></svg>" },
            columnar: { name: "Columnar Epithelium", group: "animal", mag: "40x",
                feat: "Lambe pillar jaise cells, nucleus neeche (base) par. Kabhi cilia (baal) ke saath.",
                func: "Absorption aur secretion - stomach/intestine ki lining, saans ki naali.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#fed7aa' stroke='#ea580c' stroke-width='3'><rect x='45' y='40' width='27' height='120'/><rect x='72' y='40' width='27' height='120'/><rect x='99' y='40' width='27' height='120'/><rect x='126' y='40' width='27' height='120'/></g><g fill='#c2410c'><circle cx='58' cy='140' r='7'/><circle cx='85' cy='140' r='7'/><circle cx='112' cy='140' r='7'/><circle cx='139' cy='140' r='7'/></g></svg>" },
            blood: { name: "Blood", group: "animal", mag: "40x",
                feat: "Fluid matrix (plasma) jisme laal RBC, bada WBC, aur chhote platelets tairte hain.",
                func: "Oxygen, khaana, hormones aur waste ko poore body mein transport karna.",
                svg: "<svg viewBox='0 0 200 200'><rect x='0' y='0' width='200' height='200' fill='#fef9c3'/><g fill='#ef4444'><circle cx='55' cy='60' r='16'/><circle cx='120' cy='45' r='16'/><circle cx='150' cy='110' r='16'/><circle cx='70' cy='140' r='16'/><circle cx='115' cy='160' r='16'/></g><g fill='#fca5a5'><circle cx='55' cy='60' r='6'/><circle cx='120' cy='45' r='6'/><circle cx='150' cy='110' r='6'/><circle cx='70' cy='140' r='6'/><circle cx='115' cy='160' r='6'/></g><circle cx='105' cy='105' r='24' fill='#ede9fe' stroke='#7e22ce' stroke-width='3'/><circle cx='105' cy='105' r='11' fill='#a855f7'/><g fill='#f59e0b'><circle cx='40' cy='110' r='5'/><circle cx='165' cy='60' r='5'/></g></svg>" },
            bone: { name: "Bone", group: "animal", mag: "40x",
                feat: "Hard matrix (calcium) mein gol-gol rings (Haversian system), beech mein canal.",
                func: "Body ka framework, organs ki protection, muscles ko attachment.",
                svg: "<svg viewBox='0 0 200 200'><rect x='0' y='0' width='200' height='200' fill='#f1f5f9'/><g fill='none' stroke='#94a3b8' stroke-width='4'><circle cx='100' cy='100' r='20'/><circle cx='100' cy='100' r='38'/><circle cx='100' cy='100' r='56'/><circle cx='100' cy='100' r='74'/></g><circle cx='100' cy='100' r='9' fill='#64748b'/><g fill='#475569'><circle cx='100' cy='62' r='4'/><circle cx='138' cy='100' r='4'/><circle cx='100' cy='138' r='4'/><circle cx='62' cy='100' r='4'/></g></svg>" },
            cartilage: { name: "Cartilage", group: "animal", mag: "40x",
                feat: "Smooth, flexible matrix jisme cells chhote khaano (lacunae) mein baithe hote hain.",
                func: "Naak, kaan, aur joints - haddiyon ko ragad se bachana, flexible support.",
                svg: "<svg viewBox='0 0 200 200'><rect x='0' y='0' width='200' height='200' fill='#cffafe'/><g fill='#a5f3fc' stroke='#0891b2' stroke-width='3'><circle cx='60' cy='60' r='22'/><circle cx='135' cy='70' r='22'/><circle cx='70' cy='140' r='22'/><circle cx='140' cy='140' r='22'/></g><g fill='#0e7490'><circle cx='60' cy='60' r='8'/><circle cx='135' cy='70' r='8'/><circle cx='70' cy='140' r='8'/><circle cx='140' cy='140' r='8'/></g></svg>" },
            striated: { name: "Striated (Skeletal) Muscle", group: "animal", mag: "40x",
                feat: "Lambe, cylindrical fibres with STRIPES (dhaariyan) aur kai nuclei (multinucleate).",
                func: "Haddiyon se judi, hamare CONTROL (voluntary) mein - haath-paer chalana.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#fca5a5' stroke='#b91c1c' stroke-width='2'><rect x='20' y='55' width='160' height='30' rx='10'/><rect x='20' y='115' width='160' height='30' rx='10'/></g><g stroke='#7f1d1d' stroke-width='2'><line x1='40' y1='55' x2='40' y2='85'/><line x1='60' y1='55' x2='60' y2='85'/><line x1='80' y1='55' x2='80' y2='85'/><line x1='100' y1='55' x2='100' y2='85'/><line x1='120' y1='55' x2='120' y2='85'/><line x1='140' y1='55' x2='140' y2='85'/><line x1='160' y1='55' x2='160' y2='85'/><line x1='40' y1='115' x2='40' y2='145'/><line x1='70' y1='115' x2='70' y2='145'/><line x1='100' y1='115' x2='100' y2='145'/><line x1='130' y1='115' x2='130' y2='145'/><line x1='160' y1='115' x2='160' y2='145'/></g><g fill='#450a0a'><circle cx='50' cy='70' r='5'/><circle cx='150' cy='70' r='5'/><circle cx='90' cy='130' r='5'/></g></svg>" },
            smooth: { name: "Smooth Muscle", group: "animal", mag: "40x",
                feat: "Spindle-shaped (dono taraf nukeele) cells, NO stripes, ek central nucleus.",
                func: "Involuntary (auto) - stomach, aant, blood vessels ki deewaron mein.",
                svg: "<svg viewBox='0 0 200 200'><g fill='#bbf7d0' stroke='#15803d' stroke-width='3'><ellipse cx='100' cy='45' rx='75' ry='15'/><ellipse cx='100' cy='90' rx='75' ry='15'/><ellipse cx='100' cy='135' rx='75' ry='15'/></g><g fill='#166534'><circle cx='100' cy='45' r='6'/><circle cx='100' cy='90' r='6'/><circle cx='100' cy='135' r='6'/></g></svg>" },
            cardiac: { name: "Cardiac Muscle", group: "animal", mag: "40x",
                feat: "Branched (shakhaon wali), striped cells with intercalated discs. Involuntary.",
                func: "Sirf DIL (heart) mein - zindagi bhar bina ruke, bina thake dhadakti hai.",
                svg: "<svg viewBox='0 0 200 200'><g fill='none' stroke='#9333ea' stroke-width='16' stroke-linecap='round'><path d='M25 70 h60 l20 20 h70'/><path d='M25 140 h50 l25 -25'/></g><g stroke='#f0abfc' stroke-width='2'><line x1='45' y1='62' x2='45' y2='78'/><line x1='65' y1='62' x2='65' y2='78'/><line x1='130' y1='82' x2='130' y2='98'/><line x1='150' y1='82' x2='150' y2='98'/></g><g stroke='#581c87' stroke-width='4'><line x1='88' y1='60' x2='88' y2='80'/></g></svg>" },
            neuron: { name: "Nervous Tissue (Neuron)", group: "animal", mag: "10x",
                feat: "Sabse lamba cell - cell body, dendrites (message lete), aur ek lamba axon (bhejta).",
                func: "Bijli ki speed se poore body mein messages (impulses) le jaana.",
                svg: "<svg viewBox='0 0 200 200'><g stroke='#7e22ce' stroke-width='4' fill='none'><path d='M55 100 q-22 -22 -40 -18'/><path d='M55 100 q-26 -4 -44 6'/><path d='M55 100 q-22 22 -40 28'/></g><circle cx='70' cy='100' r='26' fill='#e9d5ff' stroke='#7e22ce' stroke-width='3'/><circle cx='70' cy='100' r='9' fill='#a855f7'/><rect x='95' y='95' width='80' height='9' rx='4' fill='#c4b5fd'/><g stroke='#7e22ce' stroke-width='4' fill='none'><path d='M175 100 q15 -12 28 -8'/><path d='M175 100 q15 12 28 16'/></g></svg>" }
        };
        var ORDER = { plant: ["parenchyma","collenchyma","sclerenchyma","xylem","phloem"],
                      animal: ["squamous","columnar","blood","bone","cartilage","striated","smooth","cardiac","neuron"] };
        var MAGS = ["4x","10x","40x"];
        var currentTab = "plant", currentKey = null;

        var SCALE = { 1: 0.72, 2: 1.05, 3: 1.7 };

        function renderChips() {
            var box = document.getElementById('chips');
            box.innerHTML = '';
            ORDER[currentTab].forEach(function (k) {
                var b = document.createElement('button');
                b.className = 'chip' + (k === currentKey ? ' active' : '');
                b.textContent = DATA[k].name;
                b.onclick = function () { select(k); };
                box.appendChild(b);
            });
        }

        function magToZoom(mag) { var i = MAGS.indexOf(mag); return i < 0 ? 2 : i + 1; }

        function select(key) {
            currentKey = key;
            var d = DATA[key];
            document.getElementById('slide').innerHTML = d.svg;
            document.getElementById('p-name').textContent = d.name;
            var grp = document.getElementById('p-grp');
            grp.textContent = (d.group === 'plant') ? 'Plant tissue' : 'Animal tissue';
            grp.className = 'grp ' + d.group; grp.style.display = 'inline-block';
            document.getElementById('feat').textContent = d.feat;
            document.getElementById('func').textContent = d.func;
            // set zoom to this tissue's typical magnification
            var z = magToZoom(d.mag);
            document.getElementById('zoom').value = z;
            applyZoom(z);
            renderChips();
        }

        function applyZoom(z) {
            var svg = document.querySelector('#slide svg');
            if (svg) svg.style.transform = 'translate(-50%,-50%) scale(' + SCALE[z] + ')';
            document.getElementById('magbadge').textContent = MAGS[z - 1];
            document.getElementById('zoomval').textContent = MAGS[z - 1];
        }

        function setZoom() { applyZoom(parseInt(document.getElementById('zoom').value, 10)); }

        function setTab(t) {
            currentTab = t;
            document.getElementById('tab-plant').classList.toggle('active', t === 'plant');
            document.getElementById('tab-animal').classList.toggle('active', t === 'animal');
            select(ORDER[t][0]);
        }

        // init
        setTab('plant');
    </script>
</body>

</html>
